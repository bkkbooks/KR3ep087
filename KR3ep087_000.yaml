front:
  text: 序袁簡齋太史作靈胎先生傳云欲採其奇方異術以垂醫鑑而活蒼生因倉卒不可得僅載迮耕石汪令聞數條而語焉未詳余甚惜之今夏呂君慎盦以洄溪醫案鈔本一卷寄贈云得之徐氏及門金君復村者余讀之如獲鴻寶雖秘本而方藥不甚詳然其穿穴膏肓神施鬼設之伎足以垂醫鑑而活蒼生爰為編次竊附管窺用俟高明梓以傳世余殷望焉咸豐五年歲次乙卯十月海昌後學王士雄
  hash: sha256:521d8d56de87998936c0252d2e56646e91f4727ac47d3147f0a0cfa90d6a1ac2
