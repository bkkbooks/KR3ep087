body:
  text: 中風葑門金姓早立門首卒遇惡風口眼喎邪噤不能言醫用人參桂附諸品此近日時醫治風證不祧之方也趣余視之其形如屍面赤氣粗目瞪脈大處以祛風消痰清火之劑其家許以重貲留數日余曰我非行道之人可貨取也固請余曰與其誤藥以死莫若服此三劑醒而能食不服藥可也後月餘至余家拜謝問之果服三劑而起竟不敢服他藥惟腿膝未健手臂猶麻為立膏方而全愈此正內經所謂虛邪賊風也以辛熱剛燥治之固非以補陰滋膩治之亦謬治以辛涼佐以甘溫內經有明訓也運使王公敘揆自長蘆罷官歸里每向余言手足麻木而痰多余謂公體本豐腴又善飲啖痰流經脈宜樽節為妙一日忽昏厥遺尿口噤手拳痰聲如鋸皆屬危證醫者進參附熟地等藥煎成未服余診其脈洪大有力面赤氣粗此乃痰火充實諸竅皆閉服參附立斃矣以小續命湯去桂附加生軍一錢為末假稱他藥納之恐旁人之疑駭也戚黨莫不譁然太夫人素信余力主服余藥三劑而有聲五劑而能言然後以消痰養血之藥調之一月後步履如初張由巷劉松岑素好飲後結酒友數人終年聚飲余戒之不止時年才四十除夕向店沽酒秤銀手振秤墜而身亦仆地口噤不知人急扶歸歲朝遣人邀余與以至寶丹數粒囑其勿服他藥恐醫者知其酒客又新納寵必用溫補也初五至其家竟未服藥診其脈弦滑洪大半身不遂口強流涎乃濕痰注經傳腑之證余用豁痰驅濕之品調之月餘而起一手一足不能如舊言語始終艱澀初無子病愈後連舉子女皆成立至七十三歲而卒誰謂中風之人不能永年耶凡病在經絡筋骨此為形體之病能延歲月不能除根若求全愈過用重劑必至傷生富貴之人聞此等說不但不信且觸其怒於是諂諛之人群進溫補無不死者終無一人悔悟也西門外汪姓新正出門遇友于途一揖而僕口噤目閉四肢癱瘓舁歸不省人事醫亦用人參熟地等藥其母前年曾抱危疾余為之治愈故信余求救余曰此所謂虛邪賊風也以小續命湯加減醫者駭謂壯年得此必大虛之證豈可用猛劑其母排眾議而服之隔日再往手攬余衣兩足踏地欲作叩頭勢余曰欲謝余乎亟點首余止之復作垂涕感恩狀余慰之且謂其母曰風毒深入舌本堅硬病雖愈言語不能驟出毋驚恐而誤投溫補也果月餘而後能言百日乃痊東山席以萬年六十餘患風痹時醫總投溫補幸不至如近日之重用參附病尚未劇余診之脈洪而氣旺此元氣強實之體而痰火充盛耳清火消痰以治標養血順氣以治本然經絡之痰無全愈之理於壽命無傷十年可延也以平淡之方隨時增損調養數載年七十餘始卒此所謂人實證實養正驅邪以調和之自可永年重藥傷正速之死耳叔子靜素無疾一日餘集親友小酌叔亦在座吃飯至第二碗僅半頭忽垂箸亦落同座問曰醉耶不應又問骨哽耶亦不應細視之目閉而口流涎群起扶之別座則頸已歪脈已絕痰聲起不知人矣亟取至寶丹灌之始不受再灌而嚥下少頃開目問扶者曰此何地也因告之故曰我欲歸扶之坐輿內以歸處以驅風消痰安神之品明日已能起惟軟弱無力耳以後亦不復發此總名卒中亦有食厥亦有痰厥亦有氣厥病因不同如藥不預備則一時氣不能納經絡閉塞周時而死如更以參附等藥助火助痰則無一生者及其死也則以為病本不治非溫補之誤舉世皆然也雄按資生經云有人忽覺心腹中熱甚或曰此中風之候與治風藥而風不作夷陵某太守夏間忽患熱甚乃以水灑地設簟臥其上令人扇之次日忽患中風而卒人但咎其臥水簟而用扇也暨見一澧陽老婦見證與太守同因服小續命湯而愈合而觀之乃知中風由心腹中多大熱而作也徐氏之論正與此合易曰風自火出諺云熱極生風何世人之不悟耶若可用參附等藥者乃脫證治法不可誤施於閉證也惡風湖州副總戎穆公廷弼氣體極壯忽患牙緊不開不能飲食絕粒者五日矣延余治之晉接如常惟呼飢耳余啟視其齒上下止開一細縫撫其兩頰皮堅如革細審病情莫解其故因問曰此為惡風所吹公曾受惡風否曰無之既而恍然曰誠哉二十年前曾隨圍口外臥帳房中夜半怪風大作帳房拔去卒死者三人我其一也灌以熱水二人生而一人死我初醒口不能言者二日豈至今復發乎余曰然乃戲曰凡治皮之工皮堅則消之我今欲用藥消公之頰皮也乃以蜈蚣頭蠍子尾及朴硝硼砂冰麝等藥擦其內又以大黃牙皂川烏桂心等藥塗其外如有痰涎則吐出明晨余臥未起公啟戶曰真神仙也早已食粥數碗矣遂進以驅風養血膏而愈蓋邪之中人深則伏於臟腑骨脈之中精氣旺則不發至血氣既衰或有所感觸雖數十年之久亦有復發者不論內外之證盡然亦所當知也雄按皮膚頑痹非外治不為功此因其堅如革故多用毒烈之品也周痹烏程王姓患周痹證遍身疼痛四肢癱瘓日夕叫號飲食大減自問必死欲就餘一決家人垂淚送至舟中余視之曰此歷節也病在筋節非煎丸所能愈須用外治乃遵古法敷之拓之蒸之薰之旬日而疼痛稍減手足可動乃遣歸月餘而病愈大凡營衛臟腑之病服藥可至病所經絡筋節俱屬有形煎丸之力如太輕則不能攻邪太重則恐傷其正必用氣厚力重之藥敷拓薰蒸之法深入病所提邪外出古之所以獨重針灸之法醫者不知先服風藥不驗即用溫補使邪氣久留即不死亦為廢人在在皆然豈不冤哉雄按風藥耗營液溫補實隧絡皆能助邪益痛若輕淡清通之劑正宜頻服不可徒恃外治也痱新郭沈又高續娶少艾未免不節忽患氣喘厥逆語澀神昏手足不舉醫者以中風法治之病益甚余診之曰此內經所謂痱證也少陰虛而精氣不續與大概偏中風中風痰厥風厥等病絕不相類劉河間所立地黃飲子正為此而設何醫者反忌之耶一劑而喘逆定神氣清聲音出四肢展動三劑而病除八九調以養精益氣之品而愈余所見類中而宜溫補者止此一人識之以見余並非禁用補藥但必對證乃可施治耳雄按古云真中屬實類中多虛其實不然若其人素稟陽盛過啖肥甘積熱釀痰壅塞隧絡多患類中治宜化痰清熱流利機關自始至終忌投補滯徐氏謂宜於溫補者不多見洵閱歷之言也傷寒蘇州柴行倪姓傷寒失下昏不知人氣喘舌焦已辦後事矣余時欲往揚州泊舟桐涇橋河內適當其門晚欲登舟其子哀泣求治余曰此乃大承氣湯證也不必加減書方與之戒之曰一劑不下則更服下即止遂至揚月餘而返其人已強健如故矣古方之神效如此凡古方與病及證俱對者不必加減若病同而證稍有異則隨證加減其理甚明而人不能用若不當下者反下之遂成結胸以致聞者遂以下為戒顛倒若此總由不肯以仲景傷寒論潛心體認耳刖足傷寒嘉善黃姓外感而兼鬱熱亂投藥石繼用補劑邪留經絡無從而出下注於足兩脛紅腫大痛氣逆衝心呼號不寐余曰此所謂刖足傷寒也足將落矣急用外治之法薰之蒸之以提毒散瘀又用丸散內消其痰火並化其毒涎從大便出而以辛涼之煎劑托其未透之邪三日而安大凡風寒留於經絡無從發泄往往變為癰腫上為發頤中為肺癰肝癰脾積下為腸癰便毒外則散為斑疹瘡瘍留於關節則為痿痹拘攣注於足脛則為刖足矣此等證具載於內經諸書自內外科各分一門此等證遂無人知之矣外感停食淮安大商楊秀倫年七十四外感停食醫者以年高素封非補不納遂致聞飯氣則嘔見人飯食輒叱曰此等臭物虧汝等如何吃下不食不寢者匝月惟以參湯續命而已慕名來聘余診之曰此病可治但我所立方必不服不服則必死若徇君等意以立方亦死不如竟不立也群問當用何藥余曰非生大黃不可眾果大駭有一人曰姑俟先生定方再商其意蓋謂千里而至不可不周全情面俟藥成而私棄之可也余覺其意煎成親至病人所強服旁人皆惶恐無措止服其半是夜即氣平得寢並不瀉明日全服一劑下宿垢少許身益和第三日侵晨余臥書室中未起聞外譁傳云老太爺在堂中掃地余披衣起詢告者曰老太爺久臥思起欲親來謝先生出堂中因果殼盈積乃自用帚掠開以便步履旋入余臥所久談早膳至病者觀食自向碗內撮數粒嚼之且曰何以不臭從此飲食漸進精神如舊群以為奇余曰傷食惡食人所共知去宿食則食自進老少同法今之醫者以老人停食不可消止宜補中氣以待其自消此等亂道世反奉為金針誤人不知其幾也余之得有聲淮揚者以此時證西塘倪福徵患時證神昏脈數不食不寢醫者謂其虛投以六味等藥此方乃浙中醫家不論何病必用之方也遂粒米不得下咽而煩熱益甚諸人束手余診之曰熱邪留於胃也凡外感之邪久必歸陽明邪重而有食則結成燥矢三承氣主之邪輕而無食則凝為熱痰三瀉心湯主之乃以瀉心湯加減及消痰開胃之藥兩劑而安諸人以為神奇不知此乃淺近之理傷寒論具在細讀自明也若更誤治則無生理矣雄按韓堯年年甫逾冠體素豐而善飲春間偶患血溢廣服六味等藥初夏患身熱痞脹醫投瀉心陷胸等藥遂脹及少腹且拒按大便旁流小溲不行煩熱益甚湯飲不能下咽譫語唇焦改用承氣紫雪亦如水投石延余視之黃苔滿厚而不甚燥脈滑數而按之虛軟不過濕熱阻氣升降不調耳以枳桔湯加白前紫菀射干馬兜鈴杏仁厚朴黃芩用蘆根湯煎一劑譫語止小溲行二劑旁流止胸漸舒三劑可進稀糜六劑胸腹皆舒粥食漸加改投清養法又旬日得解燥矢而愈諸人亦以為神奇其實不過按證設法耳又按今夏衣賈戴七患暑濕余以清解法治之熱退知飢家人謂其積勞多虛遽以補食啖之三日後二便皆閉四肢腫痛氣逆衝心呼號不寐又乞余往視乃餘邪得食而熾壅塞胃腑腑氣實則經氣亦不通而機關不利也以葦莖湯去薏苡加蔞仁枳實梔子菔子黃芩桔梗煎調元明粉外用蔥白杵爛和蜜塗之小溲先通大便隨行三日而愈遊魂郡中蔣氏子患時證身熱不涼神昏譫語脈無倫次余診之曰此遊魂證也雖服藥必招其魂因訪招魂之法有鄰翁謂曰我聞虔禱灶神則能自言父如其言病者果言曰我因看戲小臺倒幾被壓受驚復往城隍廟中散步魂落廟中當以肩輿抬我歸如言往招明日延余再診病者又言我魂方至房門為父親衝散今日魂臥被上又為母親疊被掉落今不知所向矣咆哮不已余慰之曰無憂也我今還汝因用安神鎮魄之藥加豬心尖辰砂絳帛包裹懸藥罐中煎服戒曰服藥得寢勿驚醒之熟寐即神合果一劑而安調理而愈問之俱不知也失魂平湖張振西壁鄰失火受驚越數日而病發無大寒熱煩悶不食昏倦不寐余視之頗作寒喧語而神不接余曰此失魂之證不但風寒深入而神志亦傷不能速愈亦不可用重劑以煎方祛邪以丸散安神乃可漸復時正歲除酌與半月之藥而歸至新正元宵始知身在臥室間問前所為俱不知也至二月身已健同其弟元若來謝候余山中且曰我昨晚腦後起一瘰微痛余視之驚曰此玉枕疽也大險之證此地乏藥急同之歸外提內托諸法並用其弟不能久留先歸明晨我子大驚呼余曰張君危矣余起視之頭大如斗唇厚寸余目止細縫自頂及肩膿泡數千惟神不昏憒毒未攻心尚可施救急遣舟招其弟余先以護心藥灌之毋令毒氣攻內乃用煎劑從內托出外用軟堅消腫解毒提膿之藥敷之一日而出毒水斗余至晚腫漸消皮皺明日口舌轉動能食竟不成疽瘡口僅如錢大數日結痂其弟聞信而至已愈八九矣凡病有留邪而無出路必發腫毒患者甚多而醫者則鮮能治之也揚州吳運臺夫人患消證晝夜食粥數十碗氣逆火炎通夕不寐余診之六脈細數不倫神不清爽余曰此似祟脈必有他故其家未信忽一日僕婦晨起入候見床上一女盛妝危坐以為夫人也諦視則無有因以告夫人曰此女常臥我床內以此不能成寐而煩渴欲飲耳服余藥未甚效一夕夜將半病者大呼曰速請三舅爺來切不可啟門啟門則我魂必走出三舅爺者即其弟唐君悔生也臥室遼隔呼之不能聞女僕私啟門邀之魂即隨出遍歷廳堂廊廡及平昔足未經行者遇唐君趨至魂堅執其辮仍返房見己身臥床上唐君撫之魂遂歸附於身問所寓目皆不爽細考所見之女乃運臺聘室也未成婚而卒卒之時囑其父母謂吳郎必顯貴我死須懇其血食我而葬我於祖墓運臺服官後未暇辦故為祟運臺謂余曰君言有為祟者考果驗真神人也將何以慰之余曰鬼有所歸乃不為厲公當迎柩厝墓立位而祀之可也運臺依余言以行然後服藥有功而病根永除矣祟病同里朱翁元亮僑居郡城歲初其媳往郡拜賀其舅舟過婁門見城上蛇王廟俗云燒香能免生瘡腫因往謁焉歸即狂言昏冒舌動如蛇稱蛇王使二女僕一男僕來迎延余診視以至寶丹一丸遣老嫗灌之病者言此係毒藥必不可服含藥噴嫗嫗亦僕不省人事舌伸頸轉亦作蛇形另易一人灌藥訖病者言一女使被燒死矣凡鬼皆以硃砂為火也次日煎藥內用鬼箭羽病者又言一男使又被射死矣鬼以鬼箭為矢也從此漸安調以消痰安神之品月餘而愈此亦客忤之類也非金石及通靈之藥不能奏效林家巷周宅看門人之妻縊死遇救得蘇余適寓周氏隨眾往看急以紫金錠搗爛水灌之而醒明日又縊亦遇救余仍以前藥灌之因詢其求死之故則曰我患心疼甚有老嫗勸我將繩繫頸則痛除矣故從之非求死也余曰此嫗今安在則曰在裡床視之無有則曰相公來已去矣余曰此縊死鬼汝痛亦由彼作祟今後若來汝即嚼余藥噴之婦依余言嫗至曰爾口中何物欲害我耶詈罵而去其自述如此蓋紫金錠之辟邪神效若此同學李鳴古性誠篤而能文八分書為一時冠家貧不得志遂得奇疾日夜有人罵之聞聲而不見其形其罵語惡毒不堪遂惱恨終日不寢不食多方曉之不喻也其世叔何小山先生甚憐之同餘往診李曰我無病惟有人罵我耳余曰此即病也不信小山喻之曰子之學問人品人人欽服豈有罵汝之人耶李變色泣下曰他人勸我猶可世叔亦來勸我則不情甚矣昨日在間壁罵我一日即世叔也何今日反來面諛耶小山云我昨在某處竟日安得來此且汝間壁是誰家我何從入愈辨愈疑惟垂首浩嘆而已卒以憂死瘟疫雍正十年崑山瘟疫大行因上年海嘯近海流民數萬皆死於昆埋之城下至夏暑蒸屍氣觸之成病死者數千人汪翁天成亦染此症身熱神昏悶亂煩躁脈數無定余以清涼芳烈如鮮菖蒲澤蘭葉薄荷青蒿蘆根茅根等藥兼用辟邪解毒丸散進之漸知人事因自述其昏暈時所歷之境雖言之鑿鑿終虛妄不足載也余始至昆時懼應酬不令人知會翁已愈余將歸矣不妨施濟語出而求治者二十七家檢其所服皆香燥升提之藥與證相反余仍用前法療之歸後有葉生為記姓氏愈者二十四死者止三人又皆為他醫所誤者因知死者皆枉凡治病不可不知運氣之轉移去歲因水濕得病濕甚之極必兼燥化內經言之甚明況因證用藥變化隨機豈可執定往年所治祛風逐濕之方而以治瘟邪燥火之證耶雄按風濕之邪一經化熱即宜清解溫升之藥咸在禁例喻氏論疫主以解毒韙矣而獨表彰敗毒散一方不知此方雖名敗毒而群集升散之品凡溫邪燥火之證犯之即死用者審之暑同學趙子云居太湖之濱患暑痢甚危留治三日而愈時值亢旱人忙而舟亦絕少余欲歸不能惟鄰家有一舟適有病人氣方絕欲往震澤買棺乞借一日不許有一老嫗指余曰此即治趙某病愈之人也今此婦少年戀生甚故氣不即斷盍求一診余許之脈絕而心尚溫皮色未變此暑邪閉塞諸竅未即死也為處清暑通氣方病家以情不能卻借舟以歸越數日子云之子來詢之一劑而有聲二劑能轉側三劑起矣余寓郡中林家巷時值盛暑優人某之母忽嘔吐厥僵其形如屍而齒噤不開已辦後事矣居停之僕慫優求救於余余因近鄰往診以箸啟其齒咬箸不能出余曰此暑邪閉塞諸竅耳以紫金錠二粒水磨灌之得下再服清暑通氣之方明日余泛舟遊虎阜其室臨河一老嫗坐窗口榻上彷彿病者歸訪之是夜黃昏即能言更服煎劑而全愈此等治法極淺極易而知者絕少蓋邪逆上諸竅皆閉非芳香通靈之藥不能即令通達徒以煎劑灌之即使中病亦不能入於經竅況又誤用相反之藥豈能起死回生乎蘆墟迮耕石暑熱壞證脈微欲絕遺尿譫語尋衣摸床此陽越之證將大汗出而脫急以參附加童便飲之少蘇而未識人也余以事往郡戒其家曰如醒而能言則來載我越三日來請亟往果生矣醫者謂前藥已效仍用前方煎成未飲余至曰陽已回火復熾陰欲竭矣附子入咽即危命以西瓜啖之病者大喜連日啖數枚更飲以清暑養胃而愈後來謝述昏迷所見有一黑人立其前欲啖之即寒冷入骨一小兒以扇驅之曰汝不怕霹靂耶黑人曰熬爾三霹靂奈我何小兒曰再加十個西瓜何如黑人惶恐而退余曰附子古名霹靂散果服三劑非西瓜則伏暑何由退其言皆有證據亦奇事也雄按袁簡齋太史作靈胎先生傳載此案云先投一劑須臾目瞑能言再飲以湯竟躍然起故張柳吟先生以為再飲之湯當是白虎湯今原案以西瓜啖之因西瓜有天生白虎湯之名而袁氏遂下一湯字致啟後人之疑序事不可不慎此類是矣毛履和之子介堂暑病熱極大汗不止脈微肢冷面赤氣短醫者仍作熱證治余曰此即刻亡陽矣急進參附以回其陽其祖有難色余曰辱在相好故不忍坐視亦豈有不自信而嘗試之理死則願甘償命乃勉飲之一劑而汗止身溫得寐更易以方不十日而起同時東山許心一之孫倫五病形無異余亦以參附進舉室皆疑駭其外舅席際飛篤信余力主用之亦一劑而復但此證乃熱病所變因熱甚汗出而陽亡苟非脈微足冷汗出舌潤則仍是熱證誤用即死死者甚多傷心慘目此等方非有實見不可試也雄按舌潤二字最宜切記閶門內香店某姓患暑熱之證服藥既誤而樓小向西樓下又香燥之氣薰爍津液厥不知人舌焦目裂其家去店三里欲從烈日中抬歸以待斃余曰此證固危然服藥得法或尚有生機若更暴於烈日之中必死於道矣先進以至寶丹隨以黃連香薷飲兼竹葉石膏湯加蘆根諸清涼滋潤之品徐徐灌之一夕而目赤退有聲神氣復而能轉側二日而身和能食稀粥乃歸家調養而痊雄按此證已津液受爍舌焦目裂矣則用至寶丹不如用紫雪而香薷亦可議也常熟席湘北患暑熱證已十餘日身如熾炭手不可近煩躁昏沉聚諸汗藥終無點汗余曰熱極津枯汗何從生處以滋潤清芳之品三劑頭先有汗漸及手臂繼及遍身而熱解蓋發汗有二法濕邪則用香燥之藥發汗即以去濕燥病則用滋潤之藥滋水即以作汗其理易知而醫者茫然可慨也洞庭後山席姓者暑邪內結厥逆如屍惟身未冷脈尚微存所謂屍厥也余謂其父曰邪氣充塞逼魂於外通其諸竅魂自返耳先以紫金錠磨服後用西瓜蘆根蘿蔔甘蔗打汁時時灌之一日兩夜納二大碗而漸蘇問之則曰我坐新廟前大石上三日見某家老嫗某家童子忽聞香氣撲鼻漸知身在室中有一人臥床上我與之相併乃能開目視物矣新廟者前山往後山必由之路果有大石詢兩家老嫗童子俱實有其事此類甚多不能盡述其理固然非好言怪也閶門龔孝維患熱病忽手足拘攣呻吟不斷瞀亂昏迷延余診視脈微而躁膚冷汗出陽將脫矣急處以參附方親戚滿座謂大暑之時熱病方劇力屏不用其兄素信余違眾服之身稍安明日更進一劑漸蘇能言余乃處以消暑養陰之方而愈郡中友人蔣奕蘭氣體壯健暑月於親戚家祝壽吃湯餅過多回至閶門又觸臭穢痧暑夾食身熱悶亂延醫治之告以故勉用輕藥一劑亦未能中病也況食未消而暑未退豈能一劑而愈明日復診曰服清理而不愈則必虛矣即用參附是夕煩躁發昏四肢厥冷復延名醫治之曰此虛極矣更重用參附明日熱冒昏厥而斃余往唁之傷心慘目因念如此死者遍地皆然此風何時得息又傷親故多遭此禍歸而作慎疾芻言刻印萬冊廣送諸人冀世人之或悟也雄按慎疾芻言今罕流傳海豐張柳吟先生加以按語改題曰醫砭欲以砭庸流之陋習也余已刊入叢書暑邪熱呃東山席士後者暑月感冒邪留上焦神昏呃逆醫者以為壞證不治進以參附等藥呃益甚余曰此熱呃也呃在上焦令食西瓜群醫大譁病者聞余言即欲食食之呃漸止進以清降之藥二劑而諸病漸愈又有戚沈君倫者年七十時邪內陷而呃逆是時余有揚州之行乃囑相好尤君在涇曰此熱呃也君以枇杷葉鮮蘆根等清降之品飲之必愈尤君依余治之亦痊蓋呃逆本有二因由於虛寒逆從臍下而起其根在腎為難治由於熱者逆止在胸臆間其根在胃為易治輕重懸絕世人謂之冷呃而概從寒治無不死者死之後則云凡呃逆者俱為絕證不知無病之人先冷物後熱物冷熱相爭亦可呃逆不治自愈人所共見何不思也瘧洞庭姜錫常長郎佩芳體素弱而患久瘧時余應山前葉氏之招便道往唔佩芳出診色夭脈微而動易出汗余駭曰汝今夕當大汗出而亡陽矣急進參附或可挽回其父子猶未全信姑以西洋參三錢偕附子飲之仍回葉宅夜二鼓叩門聲甚急啟門而錫常以肩輿來迎至則汗出如膏兩目直視氣有出無入猶賴服過參附陽未遽脫適余偶帶人參錢許同附子童便灌入天明而汗止陽回始知人事然猶聞聲即暈倦臥不能起者兩月而後起坐上工治未病此之謂也如此危急之證不但誤治必死即治之稍遲亦不及挽回養生者醫理不可不知也痢崇明施姓遷居郡之盤門其子患暑毒血痢晝夜百餘行痛苦欲絕嘉定張雨亭其姻戚也力懇余診之余曰此熱毒蘊結治之以黃連阿膠等藥一服而去十之七八矣明日再往神清氣爽面有喜色余有事歸家約隔日重來歸後遇風潮連日行舟斷絕三日後乃得往診病者怒目視余問以安否厲聲而對曰用得好藥病益重矣余心疑之問其父曾服他人藥否隱而不言余甚疑之辭出有二醫者入門因托雨亭訪其故其父因余不至延郡中名醫仍進以人參乾薑等藥紿病者曰視汝脈者此地名醫而藥則用徐先生方也及服而痛愈劇痢益增故恨余入骨耳豈不冤哉又聞服藥之後口乾如出火欲啖西瓜醫者云痢疾吃西瓜必死欲求涼水尤禁不與因紿其童取井水嗽口奪盆中水飲其半號呼兩日而死近日治暑痢者皆用傷寒論中治陰寒入臟之寒痢法以理中湯加減無不腐臟慘死甚至有七竅流血者而醫家病家視為一定治法死者接踵全不知悔最可哀也東山葉寶倫患五色痢每日百餘次余悉治痢之法治之五六日疾如故私竊怪之為撫其腹腹內有塊大小各一儼若葫蘆形余重揉之大者裂破有聲暴下五色濃垢鬥許置烈日中光彩眩目以後痢頓減飲食漸進再揉其小者不可執持亦不能消痢亦不全止令其不必專力治之惟以開胃消積之品稍稍調之三四月而後塊消痢止大抵積滯之物久則成囊成癖凡病皆然古人原有此說但元氣已虛不可驟消惟養其胃氣使正足自能驅邪但各有法度不可並邪亦補之耳瘧痢東山姜錫常氣體素弱又患瘧痢每日一次寒如冰而熱如炭隨下血痢百餘次委頓無生理因平日相契不忍委之朝夕診視為分途而治之寒御其寒熱清其熱痢止其痢俱用清和切病之品以時消息而最重者在保其胃氣無使生機又絕經云食養盡之無使過之傷其正也諸證以次漸減而愈或謂如此大虛何以不用峻補余曰寒熱未止必有外邪血痢未清必有內邪峻補則邪留不去如此虛人可使邪氣日增乎去邪毋傷正使生機漸達乃為良策錫常亦深會此意而醫理漸明嗣後小病皆自治之所謂三折肱者也畏寒洞庭卜夫人患寒疾有名醫進以參附日以為常十年以來服附子數十斤而寒愈劇初冬即四面環火綿衣幾重寒慄如故余曰此熱邪並於內逼陰於外內經云熱深厥亦深又云熱極生寒當散其熱使達於外用蘆根數兩煎清涼疏散之藥飲之三劑而去火十劑而減衣常服養陰之品而身溫逾年附毒積中者盡發周身如火燒服寒涼得少減既又遍體及頭面口鼻俱生熱瘡下體俱腐爛膿血淋漓余以外科治熱毒之法治之一年乃復以後年彌高而反惡熱與前相反如不知其理而更進以熱藥則熱並於內寒並於外陰陽離絕而死死之後人亦終以為陽虛而死也畏風嘉善許閣學竹君夫人抱疾醫過用散劑以虛其表繼用補劑以固其邪風入營中畏風如矢閉戶深藏者數月與天光不相接見微風則發寒熱而暈延余視余至臥室見窗槅皆重布遮蔽又張帷於床前暖帳之外周以擅單診其脈微軟無陽余曰先為藥誤而避風太過陽氣不接衛氣不閉非照以陽光不可且曬日中藥乃效閣學謂見日必有風奈何曰姑去其瓦令日光下射曬之何如如法行之三日而能啟窗戶十日可見風諸病漸愈明年閣學挈眷赴都舟停河下邀余定常服方是日大風臨水窗候脈余甚畏風而夫人不覺也蓋衛氣固則反樂於見風此自然而然不可勉強也雄按論證論治可與戴人頡頏痰嘉興朱宗周以陽盛陰虧之體又兼痰凝氣逆醫者以溫補治之胸膈痞塞而陽道痿群醫謂脾腎兩虧將恐無治就余于山中余視其體豐而氣旺陽升而不降諸竅皆閉笑謂之曰此為肝腎雙實證先用清潤之品加石膏以降其逆氣後以消痰開胃之藥滌其中宮更以滋腎強陰之味鎮其元氣陽事即通五月以後妾即懷孕得一女又一年復得一子惟覺周身火太旺更以養陰清火膏丸為常饌一或間斷則火旺隨發委頓如往日之情形矣而世人乃以熱藥治陽痿豈不謬哉雄按今秋藩庫吏孫位申積勞善怒陡然自汗凜寒腕疼咳逆嘔吐苦水延余診之脈弦軟而滑形瘦面黧苔黃不渴溲赤便難以二陳去甘草加沙參竹茹枇杷葉竹葉黃連蔞仁為劑渠雲陽痿已匝月矣恐不可服此涼藥余曰此陽氣上升為痰所阻而不能下降耳一服逆平痛定嘔罷汗止即能安穀原方加人參旬日陽事即通諸恙若失蘇州府治東首楊姓年三十餘以狎遊私用父千金父庭責之體虛而兼鬱怒先似傷寒後漸神昏身重醫者以為純虛之證惟事峻補每日用人參三錢痰火愈結身強如屍舉家以為萬無生理余入視時俱環而泣余診畢又按其體遍身皆生痰核大小以千計余不覺大笑泣者盡駭余曰諸人之泣以其將死耶試往府中借大板重打四十亦不死也其父聞之頗不信曰如果能起現今吃人參費千金矣當更以千金為壽余曰此可動他人余無此例也各盡其道而已立清火安神極平淡之方佐以末藥一服三日而能言五日而能坐一月而行動如常其時牡丹方開其戚友為設飲花前以賀余適至戲之曰君服人參千金而幾死服余末藥而愈藥本可不償乎其母舅在旁曰必當償先生明示幾何余曰增病之藥值千金去病之藥自宜倍之病者有驚惶色余曰無恐不過八文錢蘿蔔子為末耳尚有服剩者群取視之果卜子也相與大笑其周身結核皆補住痰邪所凝成者半載方消邪之不可留如此幸而結在膚膜若入臟則死已久矣雄按今夏劉午亭年六十三歲久患痰喘自汗群醫皆以為虛補劑備施竟無效徐月岩囑其浼余視之汗如雨下扇不停揮睛凸囟高面浮頸大胸前痞塞脈滑而長妻女哀求慮其暴脫余曰將塞死矣何脫之云與導痰湯加旋覆海石澤瀉白前一飲而減七日後囟門始平匝月而愈繼有顧某年五十六歲肥白多痰因啖蓮子匝月漸覺不飢喘逆自汗無眠以為虛也屢補之後氣逆欲死速余視之苔黃溲赤脈滑不調以清肺滌痰治之而愈旋以茯苓飲善其後痰喘松江王孝賢夫人素有血證時發時止發則微嗽又因感冒變成痰喘不能著枕日夜俯幾而坐竟不能支持矣是時有常州名醫法丹書調治無效延余至余曰此小青龍證也法曰我固知之但弱體而素有血證麻桂等藥可用乎余曰急則治標若更喘數日則立斃矣且治其新病愈後再治其本病可也法曰誠然然病家焉能知之治本病而死死而無怨如用麻桂而死則不咎病本無治而恨麻桂殺之矣我乃行道之人不能任其咎君不以醫名我不與聞君獨任之可也余曰然服之有害我自當之但求先生不阻之耳遂與服飲畢而氣平就枕終夕得安然後以消痰潤肺養陰開胃之方以次調之體乃復舊法翁頗有學識並非時俗之醫然能知而不能行者蓋欲涉世行道萬一不中則謗聲隨之余則不欲以此求名故毅然用之也凡舉世一有利害關心即不能大行我志天下事盡然豈獨醫也哉雄按風寒外束飲邪內伏動而為喘嗽者不能捨小青龍為治案中雲感冒是感冒風寒設非風寒之邪麻桂不可擅用讀者宜有會心也痰喘亡陰蘇州沈母患寒熱痰喘浼其婿毛君延余診視先有一名醫在座執筆沉吟曰大汗不止陽將亡矣奈何非參附熟地乾薑不可書方而去余至不與通姓名俟其去乃入診脈洪大手足不冷喘汗淋漓余顧毛君曰急買浮麥半合大棗七枚煮湯飲之可也如法服而汗頓止乃為立消痰降火之方二劑而安蓋亡陽亡陰相似而實不同一則脈微汗冷如膏手足厥逆而舌潤一則脈洪汗熱不黏手足溫和而舌乾但亡陰不止陽從汗出元氣散脫即為亡陽然當亡陰之時陽氣方熾不可即用陽藥宜收斂其陽氣不可不知也亡陰之藥宜涼亡陽之藥宜熱一或相反無不立斃標本先後之間辨在毫髮乃舉世更無知者故動輒相反也雄按吳馥齋令姐體屬陰虧歸沈氏後余久不診上年聞其久嗽服大劑滋補而能食肌充以為愈矣今夏延診云嗽猶不愈及往視面浮色赤脈滑不調舌絳而干非肉不飽曰此痰火為患也不可以音嘶脅痛遂疑為損怯之未傳予清肺化痰藥為丸噙化使其廓清上膈果膠痰漸吐各恙乃安其形復瘦始予養陰善後病者云前進補時體頗漸豐而腰間疼脹略一撫摩嗽即不已自疑為痰而醫者謂為極虛所致補益加峻釀為遍體之痰也觀察毛公裕年屆八旬素有痰喘病因勞大發俯幾不能臥者七日舉家驚惶延余視之余曰此上實下虛之證用清肺消痰飲送下人參小塊一錢二劑而愈毛翁曰徐君學問之深固不必言但人參切塊之法此則聰明人以此玄奇耳後歲余病復作照前方加人參煎入而喘逆愈甚後延余視述用去年方而病有加余曰莫非以參和入藥中耶曰然余曰宜其增病也仍以參作塊服之亦二劑而愈蓋下虛固當補但痰火在上補必增盛惟作塊則參性未發而清肺之藥已得力過腹中而人參性始發病自獲痊此等法古人亦有用者人自不知耳於是群相歎服雄按痰喘礙眠亦有不兼虛者黃者華年逾五旬自去冬因勞患喘迄今春兩旬不能臥顧某作下喘治病益甚又旬日迓余視之脈弦滑苔滿布舌邊絳乃冬溫薄肺失於清解耳予輕清肅化藥治之而痊至參不入煎欲其下達與丸藥噙化欲其上戀皆有妙義用藥者勿以一煎方為了事也又有虛不在陰分者余治方嘯山今秋患痰喘汗多醫進清降藥數劑遂便溏肢冷不食礙眠氣逆脘疼面紅汗冷余診之脈弦軟無神苔白不渴乃寒痰上實腎陽下虛也以真武湯去生薑加乾薑五味人參厚朴杏仁一劑知二劑已又治顧某體肥白脈沉弱痰喘易汗不渴痰多啜粥即嘔以六君去甘草加厚朴杏仁薑汁川連蓋中虛痰滯也投七日果痊飲癖洞庭席載岳素脅下留飲發則大痛嘔吐先清水後黃水再後吐黑水而兼以血哀苦萬狀不能支矣愈則復發余按其腹有塊在左脅下所謂飲囊也非消此則病根不除法當外治因合蒸藥一料用面作圍放藥在內上蓋銅皮以艾火蒸之日十餘次蒸至三百六十火而止依法治三月而畢塊盡消其病永除年至七十七而卒此病極多而醫者俱不知雖輕重不一而蒸法為要雄按今夏江陰沙沛生鹺尹患胸下痞悶腹中聚塊臥則膊間有氣下行至指而惕然驚寤余謂氣鬱飲停治以通降適渠將赴都自慮體弱有醫者迎合其意投以大劑溫補初若相安旬日後神呆不語目眩不飢便閉不眠寒熱時作復延余診按其心下則濯濯有聲環臍左右塊已累累溺赤苔黃脈弦而急幸其家深信有年旁無掣肘凡通氣滌飲清絡舒肝之劑調理三月各恙皆瘳翻胃嘉興朱亭立曾任廣信太守向病嘔吐時發時愈是時吐不止粒米不下者三日醫以膈證回絕其友人來邀診余曰此翻胃證非膈證也膈乃胃腑乾枯翻胃乃痰火上逆輕重懸殊以半夏瀉心湯加減治之漸能進食尋復舊從此遂成知己每因飲食無節時時小發且不善飯如是數年非余方不服甚相安也後余便道過其家謂余曰我遇武林名醫謂我體虛非參附不可今服其方覺強旺加餐余謂此乃助火以腐食元氣必耗將有熱毒之害亭立笑而腹非之似有恨不早遇此醫之意不兩月遣人連夜來迎即登舟抵暮入其寢室見床前血汗滿地駭問故亭立已不能言惟垂淚引過作泣別之態而已蓋血湧鬥余無藥可施矣天明而逝十年幸活殞於一朝天下之服熱劑而隱受其害者何可勝數也雄按服溫補藥而強旺加餐病家必以為對證矣而孰知隱受其害哉更有至死而猶不悟者目擊甚多可為嘆息婁門範昭素患翻胃粒米不能入咽者月餘胸中如有物蠢動余曰此蟲膈也積血所成舉家未信余處以開膈末藥佐以硫黃三劑後吐出瘀血半甌隨吐蟲二十餘枚長者徑尺短者二寸色微紫其腸俱空乃藥入而蟲積食之皆洞腸而死者舉家驚喜以為病愈余曰未也姑以粥與之連進二碗全然不嘔更覺寬適頃之粥停不下不能再食余曰胃腑己為蟲蝕無藏食之地無救也辭不復用藥不旬日而卒呃郡中陸某患呃逆不過偶爾胃中不和挾痰挾氣世俗所謂冷呃也不治自愈非若病後呃逆有虛實寒熱之殊關於生死也陸乃膏粱之人從未患此遂大懼延醫調治醫者亦大駭云此必大虛之體所以無病見此即用人參白朮等藥痰火凝結而胃絡塞呃遂不止病者自問必死舉家驚惶余診視之不覺狂笑其昆仲在旁怪而問故余曰不意近日諸名醫冒昧至此此非病也一劑即愈矣以瀉心湯加旋覆花枇杷葉果一劑而呃止越一月呃又發仍用前日諸醫治之數日而死其老僕素相熟偶遇於他所問其主人安否因述其故余曰前幾死我以一劑救之何以蹈覆轍曰眾論紛紛謂補藥一定不錯直至臨死時欲來敦請已無及矣嗚呼豈非命耶雄按吳雨峰大令年七十一歲今秋患感發熱而兼左脅偏痛舌色乾紫無苔稍呷湯飲小溲即行不食不便脈洪且數余知其平素津虛脾約氣滯痰凝連予輕肅宣濡之劑熱漸緩脅漸舒而舌色不潤仍不喜飲溲赤便閉呃忒頻來舉家皇皇余曰無恐也便行即止矣逾二日連得暢解脈靜身涼舌色有津呃仍不減人皆謂高年病後之虛呃議用鎮補余曰此氣為痰阻升降失調得食不舒平時無嚏是其徵也授以枳桔湯加蔞薤菖茹橘半柴胡果一劑知二劑已癃學宮後金汝玉忽患小便不通醫以通利導之水愈聚而溺管益塞腹脹欲裂水氣衝心即死再飲湯藥必不能下而反增其水余曰此因溺管閉極不能稍通也以發腫藥塗之使溺器大腫隨以消腫之藥解之一腫一消溺管稍寬再以藥湯洗少腹而擠之蓄溺湧出而全通矣此無法中之法也木瀆某小便閉七日腹脹如鼓傴僂不能立衝心在頃刻矣就余山中求治余以鮮車前根搗爛敷其腹用諸利水藥內服又煎利水通氣藥使坐湯中令人揉擠之未幾溺迸出灑及揉者之面溺出鬥余其所坐木桶幾滿腹寬身直徜徉而去雄按兩外治法皆妙水腫洞庭席君際飛形體壯實喜飲善啖患水腫病先從足起遂及遍身腰滿腹脹服利水之藥稍快旋即復腫用針針之水從針孔出則稍寬針眼閉則復腫內經有刺水病之法其穴有五十七又須調養百日且服閉藥而此法失傳所以十難療一余所治皆愈而復發遂至不救雖因病者不能守法亦由醫治法不全耳惟皮水風水則一時之驟病驅風利水無不立愈病固各不同也消常熟汪東山夫人患消證夜尤甚每夜必以米二升煮薄粥二十碗而溲便不異常人此乃為火所爍也先延郡中葉天士治以烏梅木瓜等藥斂其胃氣消證少瘥而煩悶羸瘦飲食無味余謂此熱痰凝結未有出路耳以清火消痰兼和中開胃調之病情屢易隨證易方半年而愈蟲痛蘇州黃四房女年十二患腹痛愈醫愈甚余偶至其家昏厥一夕方蘇舌俱咬破流血盈口唇白而目猶直視脈參錯無常余曰此蟲痛也貫心則死非煎藥所能愈合化蟲丸與之痛稍緩忽復更痛吐出蟲二十餘條長者徑尺紫色余長短不齊淡紅色亦有白者自此而大痛不復作小痛未除蓋其窠未去也復以殺蟲之藥兼安胃補脾之方調之而蟲根遂絕蓋此證甚多醫者既不能知惟認為寒與食即以為蟲又無殺蟲之方在精力強旺者久能自化其不足者變為丁奚勞怯痞臌等證至死而人不能知亦可哀也余治此證不一姑舉其最劇者以明治法常州蔣公諱斌之孫患心腹痛上及於頭時作時止醫藥罔效向余求治余曰此蟲病也以殺蟲之藥蟲即遠避或在周身皮膚之中或在頭中按之如有蠕動往來之象余用殺蟲之藥為末調如糊到處敷上而以熱物熨之蟲又逃之他處隨逃隨敷漸次平安而根終不除遂授方令歸越二年書來云蟲根終未盡但不甚為害耳此真奇疾也怔忡淮安鉅商程某母患怔忡日服參朮峻補病益甚聞聲即暈持厚聘邀余余以老母有恙堅持不往不得已來就醫診視見二女僕從背後抱持二女僕遍體敲摩呼太太無恐吾儕俱在也猶驚惕不已余以消痰之藥去其涎以安神之藥養其血以重墜補精之藥納其氣稍得寢半月餘驚恐全失開船放炮亦不為動船擠喧嚷歡然不厭蓋心為火臟腎為水臟腎氣挾痰以衝心水能剋火則心振盪不能自主使各安其位則不但不相剋而且相濟自然之理也長興趙某以經營過勞其心患怔忡證醫者議論不一遠來就余余以消痰補心之品治其上滋腎納氣之藥治其下數日而安此與程母病同而法稍異一則氣體多痰誤服補劑水溢而火受克之證一則心血虛耗相火不寧侵犯天君之證不得混淆也亢陽姻戚殷之晉年近八旬素有腸紅證病大發飲食不進小腹高起陰囊腫亮昏不知人余因新年賀歲候之正辦後事余診其脈洪大有力先以灶灰石灰作布袋置陰囊於上袋濕而囊腫消飲以知母黃柏瀉腎之品越三日余飲於周氏周與至戚相近半里忽有叩門聲啟視之則其子扶病者至在座無不驚喜同問余曰何以用伐腎之藥而愈余曰此所謂欲女子而不得也眾以為戲言翁曰君真神人也我向者館穀京師患亦相似主人以為無生理也遂送我歸歸旬日即痊今妻妾盡亡獨處十餘年貧不能蓄妾又恥為苟且之事故病至此既不可以告人亦無人能知之者言畢悽然淚下又閱五年而卒蓋人之氣稟各殊亢陽之害與縱欲同非通於六經之理與岐黃之奧者不足與言也雄按縱欲固傷陰而亢陽亦爍陰知柏瀉腎者瀉腎火之有餘而保其不足之水也吐血平望鎮張瑞五素有血證歲辛丑余營葬先君托其買磚灰等物鄉城往返因勞悴而大病發握手泣別謂難再會矣余是時始合瓊玉膏未試也贈以數兩而去自此不通音問者三四載一日鎮有延余者出其前所服方問何人所寫則曰張瑞五曰今何在曰即在館橋之右即往候之精神強健與昔迥異因述服瓊玉膏後血不復吐嗽亦漸止因涉獵方書試之頗有效以此助館穀所不足耳余遂導以行醫之要惟存心救人小心敬慎擇清淡切病之品俾其病勢稍減即無大功亦不貽害若欺世徇人止知求利亂投重劑一或有誤無從挽回病者縱不知我心何忍瑞五深以為然後其道大行遂成一鎮名家年至七十餘而卒瓊玉膏為治血證第一效方然合法頗難其時不用人參只用參鬚生地則以浙中所出鮮生地打自然汁熬之不用幹地黃治血證舍此無有無弊者雄按行醫要訣盡此數語所謂以約失之者鮮學者勿以為淺論也洞庭吳倫宗夫人席翁士俊女也向患血證每發余以清和之藥調之相安者數年郡中名醫有與席翁相好者因他姓延請至山適遇病發邀之診視見余前方謂翁曰此陽虛失血此公自命通博乃陰陽不辨耶立溫補方加鹿茸二錢連服六劑血上冒連吐十餘碗一身之血盡脫脈微目閉面青唇白奄奄待斃急延余治余曰今臟腑經絡俱空非可以輕劑治亟以鮮生地十斤絞汁煎濃略加人參末徐徐進之歷一晝夜盡生地汁稍知人事手足得展動唇與面紅白稍分更進阿膠三七諸養陰之品調攝月餘血氣漸復夫血脫補陽乃指大脫之後陰盡而陽無所附肢冷汗出則先用參附以回其陽而後補其陰或現種種虛寒之證亦當氣血兼補豈有素體陰虛之人又遇氣升火旺之時偶爾見紅反用大熱升發之劑以擾其陽而爍其陰乎此乃道聽途說之人聞有此法而不能深思其理誤人不淺也嘉興王蔚南久患血證左脅中有氣逆沖喉旁血來有聲如沸戊子冬忽大吐數升面色白而帶青脈微聲啞氣喘不得臥危在旦夕余以阿膠三七等藥保其陰而止其血然後以降火納氣之品止其沖逆復以補血消痰健脾安胃之方上下分治始令能臥繼令能食數日之後方能安臥大凡脫血之後斷不可重用人參升氣助火亦不可多用滋膩以助痰滯胃要知補血之道不過令其陰陽相和飲食漸進則元氣自復非補劑入腹即變為氣血也若以重劑塞其胃口則永無生路矣況更用溫熱重劑助陽爍陰而速之死乎洞庭張姓素有血證是年為女辦裝過費心力其女方登轎張忽血冒升余昏不知人醫者濃煎參湯服之命懸一息邀余診視六脈似有如無血已脫盡急加阿膠三七少和人參以進脈乃漸復目開能言手足展動然後純用補血之劑以填之月餘而起蓋人生不外氣血兩端血脫則氣亦脫用人參以接其氣氣稍接即當用血藥否則孤陽獨旺而陰愈虧先後主客之分不可不辨也瘀留經絡烏鎮莫秀東患奇病痛始於背達於胸脅晝則飲食如常暮乃痛發呼號徹夜鄰里慘聞醫治五年家資蕩盡秀東欲自縊其母曰汝有子女之累尚須冀念不如我死免聞哀號之聲欲赴水其戚憐之引來就醫余曰此瘀血留經絡也因謂餘子曦曰此怪病也廣求治法以療之非但濟人正可造就已之學問因留於家用針灸熨拓煎丸之法無所不備其痛漸輕亦漸短一月而愈其人感謝不置余曰我方欲謝子耳凡病深者須盡我之技而後奏功今人必欲一劑見效三劑不驗則易他醫子獨始終相信我之知己也能無感乎腸紅淮安程春谷素有腸紅證一日更衣忽下血鬥余暈倒不知人急灌以人參一兩附子五錢而蘇遂日服人參五錢附子三錢而雜以他藥參附偶間斷則手足如冰語言無力醫者亦守而不變僅能支持急棹來招至則自述其全賴參附以得生之故診其六脈極洪大而時伏面赤有油光舌紅而不潤目不交睫者旬余矣余曰病可立愈但我方君不可視也春谷曰我以命托君止求效耳方何必視余用茅草根四兩作湯兼清涼平淡之藥數品與參附正相反諸戚友俱駭春谷弟風衣明理見道之士也謂其諸郎曰爾父千里招徐君信之至徐君慨然力保無虞任之至安得有誤耶服一劑是夕稍得寢二劑手足溫三劑起坐不眩然後示之以方春谷駭嘆諸人請申其說余曰血脫扶陽乃一時急救之法脫血乃亡陰也陽氣既復即當補陰而更益其陽則陰血愈虧更有陽亢之病其四肢冷者內經所謂熱深厥亦深也不得臥者內經所謂陽勝則不得入於陰陰虛故目不瞑也白茅根交春透發能引陽氣達於四肢又能養血清火用之使平日所服參附之力皆達於外自能手足溫而臥矣於是始相折服凡治血脫證俱同此雄按論治既明而茅根功用尤為發人所未發血痢洞庭葛允誠患血痢五年日夜百餘次約去血數石骨瘦如柴飲食不進舉家以為必無生理余友姜君錫常次子萼芳從余學醫于山中病者即萼芳妻弟也錫常憐之令同萼芳寄膳余家朝夕診視余先用滋補之劑以養其血脈復用開胃之藥以滋其化源稍健而能食久痢至五載大腸之內必生漏管遂以填補之品塞其空竅痢日減飯日增不半年而每食飯必六七碗至冬病全愈豐肥強壯歸至家親戚俱不相識認無不嘆以為奇崩徽州鹽商汪姓始富終貧其夫人年四十六以憂勞患崩證服參附諸藥而病益劇延余治之處以養血清火之劑而病稍衰蓋此病本難除根也越三年夫卒欲往武林依其親戚過吳江求方且泣曰我遇先生而得生今遠去病發必死耳余為立長服方且贈以應用丸散而去閱十數年郡中有洋客請治其室人一白頭老嫗出拜余驚問曰我即汪某妻也服先生所贈方藥至五十二而崩證絕今已六十餘強健逾昔我婿迎我於此病者即我女也不但求治我女必欲面謝故相屈耳蓋崩證往往在五十歲以前天癸將絕之時而衝任有火不能攝納橫決為害至五十以後天癸自絕有不藥而愈者亦有氣旺血熱過時而仍有此證者當因時消息總不外填陰補血之法不知者以溫熱峻補氣愈旺而陰愈耗禍不旋踵矣此極易治之病而往往不治蓋未能深考其理而誤殺之耳瘀血沖厥東山水利同知借余水利書余往索出署突有一人攔輿喊救命謂我非告狀欲求神丹奪命耳其家即對公署因往視病者死已三日方欲入棺而唇目忽動按其心口尚溫誤傳余能起死回生故泥首哀求余辭之不獲乃紿之曰余舟中有神丹可救因隨之舟中與黑神丸二粒教以水化灌之非能必其效也隨即歸家後復至山中其人已生蓋此乃瘀血衝心厥而不返黑神丸以陳墨為主而以消瘀鎮心之藥佐之為產後安神定魄去瘀生新之要品醫者苟不預備一時何以奏效乎胎中毒火南門陳昂發夫人懷娠三月胎氣上逆舌腫如蛋色紫黑粒米不能下醫者束手延余治余曰此胎中有毒火衝心舌為心苗故毒聚於舌腫塞滿口則飲食絕矣乃用珠黃散及解毒軟堅之藥屢塗其舌腫漸消而納食復用清涼通氣之方消息治之或謂解毒清火與胎有害余曰不然胎氣旺甚愈涼愈安但熱毒傷陰當滋養其血氣耳乃專服余藥孿生二子後詢其得病之故乃曾聽邪人之言服不經之藥幾至傷生可為戒也子利爛溪潘開於表弟其夫人懷娠患痢晝夜百餘次延余視余以黃芩湯加減兼養胎藥飲之利遂減飲食得進而每日尚數十次服藥無效余曰此不必治名曰子利非產後則不愈但既產恐有變證耳病家不信更延他醫易一方則利必增劇始守余言止服安胎藥少許後生產果甚易而母氣大衰虛象百出適余從浙中來便道過其門復以產後法消息治之病痊而利亦止蓋病有不必治而自愈強求其愈必反致害此類甚多不可不知也雄按此所謂利即是泄瀉古人名曰利下非今之痢也痢疾古名滯下若胎前久痢不愈產後其能免乎試胎余往候族兄龍友坐談之際有老嫗惶遽來曰無救矣余駭問故龍友曰我侄婦產二日不下穩婆已回絕矣問何在曰即在前巷余曰試往診之龍友大喜即同往漿水已涸疲極不能出聲穩婆猶令用力迸下余曰無恐此試胎也尚未產勿強之扶令安臥一月後始產產必順且生男穩婆聞之微哂作不然之態且曰此何人說此大話我收生數十年從未見有如此而可生者其家亦半信半疑余乃處以養血安胎之方一飲而胎氣安和全無產意越一月果生一男而產極易眾以為神龍友請申其說曰凡胎旺而母有風寒勞碌等感動則胎墜下如欲生之象安之即愈不知而以為真產強之用力則胎漿破而胎不能安矣余診其胎脈甚旺而月份未足故知不產今已搖動其胎將來產時必易脫故知易產左脈甚旺故知男胎此極淺近之理人自不知耳產後風熱西濠陸炳若夫人產後感風熱瘀血未盡醫者執產後屬虛寒之說用乾薑熟地治之且云必無生理汗出而身熱如炭唇燥舌紫仍用前藥余是日偶步田間看菜花近炳若之居趨迎求診余曰生產血枯火熾又兼風熱復加以剛燥滋膩之品益火塞竅以此死者我見甚多非石膏則陽明之盛火不解遵仲景法用竹皮石膏等藥余歸而他醫至笑且非之謂自古無產後用石膏之理蓋生平未見仲景方也其母素信余立主服之一劑而蘇明日炳若復求診余曰更服一劑病已去矣無庸易方如言而愈醫者群以為怪不知此乃古人定法惟服薑桂則必死產後血臌蘇州顧某繼室產後惡露不出遂成血臌醫者束手顧君之兄掌夫余戚也延余治之余曰此瘀血凝結非桃仁等所能下古法有抵當湯今一時不及備以唐人法用肉桂黃連人參大黃五靈脂成劑下其瘀血群醫無不大笑謂寒熱補瀉並相犯之藥合而成方此怪人也其家因平日相信與服明日掌夫告余曰病不可治矣病者見鬼竊飲所服藥乃大呼曰我不能食鬼之所吐也先生可無治矣余往驗之藥本氣味最烈之品嘗之與水無二怪之仍以前方煎成親往飲之病者不肯飲以威迫之懼而飲是夕下瘀血升余而腹漸平思食余以事暫歸隔日復往其門首掛榜燒楮余疑有他故入門見者皆有喜色詢之則曰先生去之夕病者夢其前夫人怒曰汝據余之室奪余之財虐余之女余欲傷汝命今為某所治余將為大蛇以殺汝即變為大蛇大驚而醒故特延僧修懺耳蓋前夫人以產後血臌亡病狀如一而醫者治不中病遂致不起蓋一病有一病治法學不可不博也產後腸癰洞庭某婦產後小腹痛甚惡露不止奄奄垂斃余診之曰惡露如此多何以其痛反劇更詢其所行之物又如膿象余曰此乃子宮受傷腐爛成癰也宜令名手穩婆探之果然遂用綿作條裹入生肌收口之藥而內服解毒消瘀之方應手而愈凡產後停瘀每多外證如此甚多不可不知也惡痘吳超士家僮已弱冠隨超士往戲館觀戲因寒熱作而先歸夜半呻吟不絕至明旦往視則匿於床下口稱群鬼欲殺之拽出視之細點如麩余曰此惡痘也色暗紫急以升麻羌活生地等藥煎湯灌之三日而痘形出遍體無毫孔頭面結聚重疊始終用滋養氣血之品不用時下惡藥一味二十餘日始結痂焦黑成片大如手掌形如缸爿剝去之後非複本來面目見者俱不相識可知痘證之必死者絕少皆醫以寒涼克伐之藥誤之也毛履和之女患痘醫者曰此悶痘也五日而斃舉家扼腕適余至曰先生亦治痘否余曰醫者不肯治之痘則治曰已回絕矣因入視遍體大熱神昏不語細點如魚子隱在肉中余急以升麻羌活湯為主而佐以養血透肌藥飲之三日而痘形顯前醫群駭告之以故則又大笑曰升麻羌活等藥豈入痘科不知升麻湯乃痘證初起之主方而醫者不知也繼以養血解毒補氣之品其結痂也額如覆釜身如樹皮發連痂脫三年始生時醫見此等證必用大黃石膏及惡毒之物虛其里而增其毒五日而死之言必驗病家亦以為醫者斷期如神孰知非其識之高乃其藥之靈也嗚呼慘哉余同學沈冠云之女痘密黑陷而無漿醫者束手冠云告以故余曰姑處以補托之法用地黃歸身黃耆人參等藥聞者咸笑一服而漿來至明日以參貴停服余曰精力不充毒發未盡未盡必生痘毒後果臂灣生二毒復為治之而安余長孫女種痘點密而色深赤種痘之醫束手余用清發之藥並時含紫雪赤色稍衰將就寢復往視忽變灰白色而咬牙余驚曰證變虛寒矣此所謂亢害承製也即用人參鹿茸等藥托之至三鼓而瘡色復紅形漸高起仍用清火養血之方而漿成蓋病變無常頃刻轉易故凡屬危險之證醫者當時時消息不可片刻離也但不明理之醫則偏僻固執又方法絕少不能肆應不窮耳流注蘇州一小兒甫九齡頗聰慧而患流注肩背腰脅十餘處百端醫治無效余視之曰此惟大活絡丹能愈服至三十餘丸未破者消已破者收口更服補氣血之藥而愈蓋流注一證由風寒入膜所致膜在皮中旁通四達初無定處所以隨處作患此真脈絡之病故古人制大活絡丹以治之其餘煎丸皆非正治所謂一病有一病之法藥不對證總難取效也本邑劉近曾夫人患虛痰流注色㿠脈虛發無定處病極危險非旦夕可奏功余辭不能治郡中一醫以百金包好因留在家治之聞余有不能治之說笑曰我醫好後更請徐君質之當無言可對耳月餘劉君之兄元谷招余診近曾出曰流注之疾雖向愈而未收口托在相好肯一觀否余因視之肩後瘡孔大如錢內膜乾空與皮不連氣促脈微診畢而出近曾求方余笑不答書危在頃刻四字劉不信少頃內呼劉父子入已氣絕矣群執包好之醫欲加以無禮余曉之曰此病本不治非藥誤也但不知生死為無目耳乃釋之蓋流注之證其類不同大段皆津液枯而痰流膜內之證當內外交治而祛邪補虛亦另有切病方藥蠻補無益也嘉善張卓舟未弱冠患流注五年自脅及腰腿連生七八孔寒熱不食僅存人形歷年共服人參二三千金萬無生理父母先亡只有慈母其伯悉收其田產文契專待其斃而取之其從兄汪千造余家哀懇余頗憐之破格往視半身幾成枯骨此乃虛痰流注醫者不能治其經絡之痰徒費重貲而無一中病者則藥之誤而非病之真無治也余用大活絡丹為主而外敷拔管生肌之藥醫者聞之大笑曰活絡丹辛暴之藥豈可入口蓋彼惟知俗本所載烏頭蚯蚓之活絡丹而不知古方五十餘味之大活絡丹也蓋流注之痰全在於絡故非活絡丹不效以後膿稀肉長管退筋舒漸能起立不二年而肌肉豐肥強健反逾於常嗚呼不知對病施藥徒事蠻補舉世盡然枉死者不知其幾也雄按大活絡丹治虛痰流注深為合法而外科不知也若實痰則控涎丹最妙腸癰長興朱季舫少子嘯虎官性極聰敏年九歲腹痛腳縮抱膝而臥背脊突出一癤晝夜哀號遍延內外科診視或云損證或云宿食或云發毒當刺突出之骨以出膿血其西席茅豈宿力薦余治往登其堂名醫滿座豈宿偕余診視余曰此縮腳腸癰也幸未成膿四日可消聞者大笑時季舫為灤州牧其夫人孔氏名族之女獨信余言余先飲以養血通氣之方並護心丸痛遂大減諸醫謂偶中耳明日進消瘀逐毒丸散謂曰服此又當微痛無恐其夜痛果稍加諸醫聞之譁然曰果應我輩之言也明早又進和營順氣之劑痛止八九而腳伸脊平果四日而能步諸醫以次辭去中有俞姓者儒士也虛心問故余謂雜藥亂投氣血傷矣先和其氣血自得稍安繼則攻其所聚之邪安能無痛既乃滋養而通利之則臟腑俱安矣南濠徐氏女經停數月寒熱減食肌肉消爍小腹之右下達環跳隱痛微腫醫者或作怯弱或作血痹俱云不治余診其脈洪數而滑寒熱無次謂其父曰此瘀血為癰已成膿矣必自破破後必有變證宜急治與以外科托毒方並丸散即返山中越二日天未明叩門甚急啟視則徐之戚也云膿已大潰而人將脫矣即登其舟往視膿出升余脈微膚冷陽隨陰脫余不及處方急以參附二味煎湯灌之氣漸續而身漸溫然後以補血養氣之品兼托膿長肉之藥內外兼治兩月而漏口方滿精神漸復月事以時大凡瘀血久留必致成癰產後留瘀及室女停經外證極多而醫者俱不能知至膿成之後方覓外科施治而外科又不得其法以致枉死者比比然也腿癰橫涇錢某之女素有痞塊從腹入少腹又從少腹入環跳之下大腿外臁變成大癰膿水淋漓成管管中有飯粒流出真不可解日漸狼狽諸醫束手其父泣而告余曰寒儉之家服人參已費百金而毫無效驗惟有立而視其死耳余曰人參不可長繼祛膿填漏外科自有正方也乃為合治漏之藥內服外敷所服末藥亦有從瘡口流出者繼乃漸少胃氣亦開肌肉內生數月之後痂結筋舒前此從未生育期年懷孕生子凡治病各有對證方藥非可以泛治之方圖僥倖也臂疽長興周某之子臂生疽經年膿水不幹變為多骨所食米粒間有從疽中出者奄奄待斃余為內托外敷所服末藥亦從瘡口出繼而膿漸減少所出碎骨皆膿結成出盡之後肌肉日長口收痂結而愈項疽郡中朱姓患項疽大痛徹心時時出血延醫施治漫腫滋甚神思昏迷束手待斃延余視急用圍藥裹住根盤敷以止血散飲以護心丸痛緩血止神安得寢明日前醫來告以故醫謂同一金黃散我用無效彼用神驗此命運不同非藥異也彼蓋不知圍藥每病各殊耳瘡口已定乃大托其膿兼以消痰開胃之品飲食漸進坐臥皆安兩月而愈凡治癰疽之法在視其人之肥瘠瘦弱之軀尤忌見血瘡口若大則肌肉難生所以最重圍藥其方甚多不可不廣求而預備也同學沈自求喪子憂愁鬱結疽發於項調治無效項三倍瘡口環頸長尺余闊三寸惟近咽喉處二寸未連而枕骨直下之筋未斷血流不止余辭不治堅懇不已先進護心丸二粒令毒不內攻又付止血散止其血外用圍藥厚塗束其根更以珠黃等藥時時敷瘡口上其膏藥長一尺三寸再以黃耆四兩煎湯煎藥服之勢定而飲食稍進數日血止膿成肌與腐肉方有界限瘡口太大皮肉不能合以生肌等藥並參末厚塗而封之月餘口乃合病家欲備人參斤許以待用余曰無庸也諸痛癢瘡皆屬於火膿流肉腐皆傷於陰凡屬外證總以清火養陰為主而加開胃健脾之藥人參止用錢許數劑即止此從古一定之法其用溫補乃後世訛傳之術無不陰受其害余凡治大證無不神效時人多不之信也蘇州章倚文夫人體質本弱平時飲食絕少忽患項毒平漫不腫痛輒應心醫者謂大虛之證投以峻補毒伏神昏奄奄一息延余視之余曰毒無補理瘡口不高則以圍藥束之飲以清涼養血之品托毒於外兼服護心丸痛定而瘡根漸收余暫歸轉託一醫代治醫者強作解事曰圍藥不過金黃散之類無益也去之用藥亦意為改易以炫己能瘡遂散大血出不止痛復甚而神疲余再至大駭詢之乃知其故醫者乃不復生議論於是仍用前法膿成食進而後得安蓋外科病不治者絕少皆由醫之不得其道所以動手輒誤病變日增而藥無一驗即束手無策矣對口白龍橋吳時臣年七十餘矣患對口痛欲絕余視其外無圍藥瘡內反有插藥五條乃三品一條槍此古方蝕頑肉之惡藥而近日醫者誤以為必用之品所以痛極昏迷余悉拔去糝以珠黃解毒散其痛立除而神安復用圍藥裹住其根使瘡頭高而膿易出或謂七旬之人精力已衰宜用溫補余曰外證俱屬火苟非現證虛寒從無用熱藥之理進清涼開胃之劑胃氣開則肌肉自生調養月餘而愈精神較勝前矣平湖徐掄齋陰毒對口頸項漫腫而色紫有頭如痘者百餘神煩志亂醫者束手就治於余余曰此乃陰毒兼似有祟其家為述患病之後鬼聲繞屋鬼火不斷余曰且敷藥試之色稍鮮腫亦稍消明晨視之色轉淡紅其如痘者俱出微膿而低軟中聚一頭亦不甚大勢已消其十之三神亦漸清而思飲食病雖屬陰亦不可用熱藥以增邪火惟和血通氣使營衛充盈使血中一點真陽透出則陰邪自退若用熱補則反助毒火而生機益絕故治外科之陰證非若傷寒之陰證為外感之寒邪可專用桂附以驅之也今之號外科者惟拾內科之緒論以為熱可禦寒則貽害不小矣發背洞庭吳姓從徐州經紀返棹背起粟粒深紫色而痛應心周圍肌肉皆不仁知非輕證未至家而就余治余辭不能再三懇求姑用圍藥束之稍定病者謂我尚未到家當歸處分家事求借一廛如果不治死無餘憾歸二日而復來其瘡不甚大頂微高而堅黑當用刀挑破方可上藥以洋刀點之洋刀堅利非凡竟不能入用力挑之刀頭折乃用金針四面刺之以泄毒氣內托外敷其方屢變然後膿從四旁出頑蓋自落約深半寸脊骨隱露其尖亦腐去急以生肌散填補之內服峻補之劑兩月而肉滿皮完此九死一生之證不早為外束內托則焦骨攻臟無生理矣周莊陸姓疽發背周徑尺余一背盡腫頭以百計毒氣內攻沉悶昏迷醫者以平塌無頭用桂附托之余曰此瘡止宜收小若欲加高則根盤如此之大而更加高則背馱栲栳矣此乃火毒用熱藥必死乃以束根提毒之藥敷之一夕而瘡頭俱平皮膚亦潤止有大頭如杯高起於大椎骨之下大三寸許尚不思飲食惟求食西瓜醫嚇以入口即死余令縱其所食一日之內連吃大西瓜兩個明日知飢欲求肉飯食肉四兩飯半碗明日更加始終用托毒清火之劑而膿成口斂余囑曰此疽初起盈背背中脂膜皆空非填補里膜必有他變有庸醫獻媚曰病已全愈為此說者圖厚謝也我力能保之病家利其省費從之至來年二月忽舊疤中一細眼流血不止放血鬥余兩日而卒蓋其前一背盡腫其中之脂膜俱化成膿從大口出盡庸醫安知治法貪利誤人富貴之家往往最信此等人可不省察耶對心發郡中唐廷發偶過余寓時方暑謂背上昨晚起一小瘰搔之甚癢先生肯一看否余視之駭曰此對心發也唐不甚信曰姑與我藥余曰君未信余言一服藥而毒大發反疑我誤君矣含笑而去明日已大如酒杯而痛甚乃求醫治余曰此非朝夕換方不可我不能久留郡寓奈何因就醫余家旦暮易法其中變遷不一卒至收口其收口前十日忽頭痛身熱神昏譫語瘡口黑陷六脈參差余適出門兩日歸而大駭疑為瘡證變重幾無可藥細詢其僕乃貪涼當風而臥瘡口對風膏藥又落風貫瘡中即所謂破傷風也乃從外感治法隨用風藥得汗而解身涼神清瘡口復起仍前治法而痊若不審其故又不明破傷風治法則必無效惟有相視莫解而已肺癰蘇州錢君復庵咳血不止諸醫以血證治之病益劇余往診見其吐血滿地細審之中似有膿而腥臭者余曰此肺癰也膿已成矣金匱云膿成則死然有生者余遂多方治之錢亦始終相信一月而愈蓋余平日因此證甚多集唐人以來治肺癰之法用甘涼之藥以清其火滋潤之藥以養其血滑降之藥以祛其痰芳香之藥以通其氣更以珠黃之藥解其毒金石之藥填其空兼數法而行之屢試必效今治錢君亦兼此數法而痊強健逾舊幾二十年至乾隆三十年家業日隆因遷居大造途中相值邀余視其新居坐談良久辭出見其右額有豆大黑點問之錢對曰昨此處生一瘰頗癢無他苦也余諦審之曰此毒發於內治之失宜可以傷命非輕疾也錢笑而腹非之余曰本當為君竭力但君未信若一用藥而毒大發則反以為病由藥作故不敢但多年相好不可不盡言如五六日病勢增重當來相聞勿為人誤越五日遣人邀余山中往則見其額腫目閉哀號竟夕方悔信余之不早細視皮中有物乃三品一條槍也拔去五條嗟乎此乃腐爛死肌之惡藥好肉用上其痛應心況額上皮內即骨橫插皮中所以痛極余既不能久留又壞證難治力辭歸山易以他醫面目俱腐而卒嗟乎前何相信之深後何不信之至豈非命乎乳癤東洞庭劉某夫人患乳癤醫者既不能消散成功之後又用刀向乳頭上寸余出毒瘡口向上膿反下注乳囊皆腐寒熱不食將成乳勞內外二科聚議無定群以為不治矣延余診之曰此非惡證治不如法耳尚可愈也但須百日耳其家戚族皆少年喜事聞余言欲塞群醫之口向病家曰我輩公懇先生留山中百日必求收功而後已如欲歸家備快舟以迎送余初不允繼勉承之多方治之至九十日而未見功蓋病者柔弱畏痛既不敢於乳下別出一頭而膿水從上注下頗難出盡故有傳囊之患忽生一法用藥袋一個放乳頭之下用帛束縛之使膿不能下注外以熱茶壺熨之使藥氣乘熱入內又服生肌托膿之丸散於是膿從上泛厚而且多七日而膿盡生肌果百日而全愈後以此法治他證無不神效可知醫之為術全賴心思轉變刻舟求劍終無一驗也下疳濮院沈維德患下疳前陰連根爛盡溺從骨縫中出瀝灌腎囊中哀號痛楚肛門亦復爛深半寸載至余家止求得生為幸余亦從未見此病姑勉為治之內服不過解毒養血之劑而敷藥則每用必痛屢易其方至不痛而後已兩月後結痂能行惟陰莖僅留根耳余偶閱秘本有再長靈根一方內用胎狗一個適余家狗生三子取其一泥裹煨燥合藥付之逾二年忽生一子舉族大譁謂人道已無焉能生子蓋維德頗有家資應繼者懷覬覦之心也其岳徐君密詢之沈曰我服藥後陽道已長生子何疑徐君乃集其族人共驗之陽道果全但累生如有節而無總皮再期又生一子眾始寂然遠近傳之以為奇事今猶有述之以為異聞者附再長靈根方五十日復生效煅乳石三錢五分琥珀七分硃砂六分人參一錢真珠七分牛黃四分真水粉五分胎狗一個雄黃六分用靈仙首烏大力子蓼草汁煮一晝夜炒如銀色上為末每服三釐日進四服臥又一服俱以土茯苓半斤陰陽水十二碗煎五碗連送五服七日驗雄按煮一晝夜而炒如銀色之藥品即上文煅乳石等九味也詳玩文義似宜移上字於用字之上方順第胎狗煨燥必黑全狗分兩又必數倍於諸藥同煮同炒不知何以能如銀色是必煨時不令黑也筋瘤蘇州一小童背上腫大如覆碗俯不能仰群謂駝疾也或戲余曰君能治奇疾若愈此則我輩服矣其父母以余為果能治也亦力求焉余實不知其中何物姑以腐藥塗上數日皮開肉爛視其肉如蚯蚓者盤結數條細審之乃背上之筋所聚也余頗悔輕舉急以舒筋收口丸散外敷內服筋漸散創漸平膚完而身直矣此筋瘤之一種也哄傳以余為能治駝疾從此求治駝者雲集余俱謝不能此乃幸而偶中古人並無此治法癸未入都尚有人詢及者余謝無此事而已存此以識異雄按洄溪神於外科讀其所評外科正宗等書已見一斑是編列案僅十餘條然各大證治法略備洵癰疽家赤文綠字之書也可不奉為圭臬哉附刻許辛木農部札惠書久不報闕然於懷承示醫書二種奉繳弟於此事茫然洄溪案僅校出誤字數處即轉寄吳葆山舍親葆山醫學與王君孟英在伯仲之間亦極贊此書手眼通靈即過錄一本奉為鴻寶又校正數字屬轉達左右早付手民以廣其傳功德不細也內有脫簡弟意得原本補之大妙無則於章末旁註一闕字從郭公夏五之例何如覆蔣中堂書與醫案無異似宜附刻與秦司寇書則皆寒喧語可刪耳瘍科選粹批點確是徐氏手筆足與所批正宗相輔而行已過錄珍藏矣又來書謂中多時俗口頭語弟意名醫手筆既未可輒改又此等書取其活人而已不當以詩文例繩之正如藥物牛溲馬勃止期有用非若佳花美卉有一殘缺便須摘去也原本不分卷亦可仍之頁多則當分頁不滿百可無分也此書原本傳寫多誤光焴與錢警石泰吉廣文許辛木楣農部兩先生商榷再四始行付梓茲摘錄農部札如上闕簡已從原本校補此外不敢增損一字以見光焴於此蓋慎之又慎云海昌蔣光焴附識
